<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tec Faktory Blog</title>

<meta name="description" content="Tec Faktory technology, cybersecurity and digital awareness articles.">


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">


<link rel="stylesheet" href="assets/css/blog.css">


<style>

.article-page{

max-width:900px;
margin:60px auto;
padding:20px;

}


.article-image{

width:100%;
height:450px;
object-fit:cover;
border-radius:25px;
margin-bottom:35px;

}



.article-title{

font-size:45px;
line-height:1.3;

}



.article-meta{

color:#38bdf8;
margin:20px 0 40px;

}



.article-content{

font-size:17px;

}



.article-content h2{

margin-top:40px;
margin-bottom:15px;

}



.article-content p{

margin:20px 0;

}



.author-box{

display:flex;
align-items:center;
gap:20px;

background:var(--card);

padding:25px;

border-radius:20px;

margin-top:60px;

}



.author-box img{

width:80px;
height:80px;

border-radius:50%;

object-fit:cover;

}



.share-box{

margin-top:30px;

padding:25px;

background:var(--card);

border-radius:20px;

}



.share-box button{

padding:12px 25px;

border:none;

border-radius:30px;

cursor:pointer;

background:

linear-gradient(
90deg,
var(--primary),
var(--secondary)
);

color:white;

font-weight:600;

}



@media(max-width:768px){


.article-page{

padding:15px;

}



.article-image{

height:220px;

}



.article-title{

font-size:30px;

}



.author-box{

flex-direction:column;

text-align:center;

}


}



</style>


</head>



<body>



<header>

<nav class="navbar">


<div class="logo">

Tec <span>Faktory</span>

</div>



<div class="nav-actions">


<button id="themeToggle">

☀️

</button>


</div>


</nav>

</header>






<main class="article-page">



<img 
id="postImage"
class="article-image"
src=""
alt=""
>




<h1 
id="postTitle"
class="article-title">

Loading...

</h1>




<div id="postMeta" class="article-meta">

</div>





<div 
id="postContent"
class="article-content">

Loading article...

</div>







<section class="author-box">


<img 
src="images/logo.png"
alt="Tec Faktory">


<div>

<h3>
Tec Faktory
</h3>


<p>

Technology education, cybersecurity awareness and digital solutions.

</p>


</div>


</section>







<section class="share-box">


<h3>
Share this article
</h3>


<br>


<button onclick="sharePost()">

Share Article

</button>



</section>





</main>







<footer>

© 2026 Tec Faktory. All Rights Reserved.

</footer>







<script src="js/post.js"></script>



<script>


// THEME SWITCH


const themeButton =
document.getElementById("themeToggle");



if(localStorage.getItem("theme")==="light"){

document.body.classList.add("light");

themeButton.innerHTML="🌙";

}



themeButton.onclick=()=>{


document.body.classList.toggle("light");


if(document.body.classList.contains("light")){

localStorage.setItem("theme","light");

themeButton.innerHTML="🌙";


}else{


localStorage.setItem("theme","dark");

themeButton.innerHTML="☀️";

}


};






// SHARE


function sharePost(){


if(navigator.share){


navigator.share({

title:
document.title,

url:
window.location.href


});


}else{


navigator.clipboard.writeText(
window.location.href
);


alert(
"Article link copied!"
);


}


}



</script>



</body>

</html>
